<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealUp - Autoimmune Health Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              matcha: {
                50: '#f8f4eb',
                100: '#f1ebdf',
                200: '#e4ddce',
                300: '#d4ccb8',
                400: '#b8c7ae',
                500: '#a8c39e',
                600: '#7ea96b',
                700: '#6a8963',
                800: '#556b4a',
                900: '#3d4b3e',
              }
            },
            fontFamily: {
              sans: ['Source Sans 3', 'Segoe UI', 'sans-serif'],
            },
            fontSize: {
              sm: ['0.875rem', { lineHeight: '1.6' }],
              base: ['1rem', { lineHeight: '1.65' }],
              md: ['1.125rem', { lineHeight: '1.65' }],
              lg: ['1.375rem', { lineHeight: '1.4' }],
              xl: ['1.75rem', { lineHeight: '1.3' }],
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
        font-size: 17.5px;
        line-height: 1.74;
        background-color: #f8f4eb; /* matcha-50 */
        color: #4f554d;
        transition: background-color 200ms ease, color 200ms ease;
        background-image:
          radial-gradient(circle at top left, rgba(168, 195, 158, 0.2), transparent 30%),
          radial-gradient(circle at bottom right, rgba(201, 178, 139, 0.14), transparent 26%),
          linear-gradient(180deg, #f8f4eb 0%, #f4efe5 52%, #eef3e8 100%);
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
        color: #556b4a;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }
      p, li, label, span, button, input, textarea, select {
        line-height: 1.6;
      }
      button, input, textarea, select {
        font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      }
      p, li, label {
        color: #625f58;
      }
      input, textarea, select {
        font-size: 17px;
      }
      .healup-card {
        border: 1px solid rgba(228, 221, 206, 0.95);
        background: linear-gradient(180deg, rgba(255, 253, 249, 0.92) 0%, rgba(248, 244, 235, 0.88) 100%);
        box-shadow: 0 18px 38px rgba(80, 87, 77, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(18px);
      }
      .healup-card-soft {
        border: 1px solid rgba(231, 225, 211, 0.96);
        background: linear-gradient(180deg, rgba(253, 250, 244, 0.92) 0%, rgba(239, 243, 232, 0.82) 100%);
        box-shadow: 0 14px 32px rgba(86, 107, 74, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(14px);
      }
      .healup-divider {
        height: 1px;
        width: 100%;
        background: linear-gradient(90deg, rgba(126, 169, 107, 0), rgba(126, 169, 107, 0.45), rgba(194, 169, 128, 0.35), rgba(126, 169, 107, 0));
      }
      .healup-reveal {
        animation: healupFadeUp 480ms ease-out both;
      }
      .healup-button {
        background-image: linear-gradient(135deg, #7ea96b 0%, #6a8963 100%);
        box-shadow: 0 10px 26px rgba(106, 137, 99, 0.22);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease, background-image 180ms ease;
      }
      .healup-button:hover {
        transform: scale(1.02);
        filter: saturate(0.92) brightness(1.03);
        box-shadow: 0 14px 30px rgba(106, 137, 99, 0.24);
      }
      .healup-button:active {
        transform: scale(0.99);
      }
      .healup-button-secondary {
        border: 1.5px solid rgba(126, 169, 107, 0.34);
        background: rgba(255, 253, 249, 0.78);
        color: #556b4a;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.56);
        transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }
      .healup-button-secondary:hover {
        transform: scale(1.02);
        background: rgba(241, 235, 223, 0.9);
        border-color: rgba(126, 169, 107, 0.48);
      }
      .healup-button-secondary:active {
        transform: scale(0.99);
      }
      .healup-parallax-layer {
        transform: translate3d(0, calc(var(--healup-scroll-y, 0px) * var(--parallax-speed, 0.06)), 0);
        transition: transform 180ms ease-out;
        will-change: transform;
      }
      .healup-parallax-orb {
        background: radial-gradient(circle at 30% 30%, rgba(255, 253, 249, 0.88), rgba(168, 195, 158, 0.18) 52%, rgba(194, 169, 128, 0.08) 100%);
        filter: blur(2px);
      }
      .healup-parallax-leaf {
        color: rgba(106, 137, 99, 0.26);
        filter: drop-shadow(0 14px 24px rgba(106, 137, 99, 0.12));
      }
      .healup-focus:focus-visible,
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(248, 244, 235, 0.95), 0 0 0 6px rgba(126, 169, 107, 0.42);
        border-color: rgba(126, 169, 107, 0.72) !important;
      }
      .healup-saved-toast {
        background: linear-gradient(135deg, rgba(239, 228, 209, 0.95) 0%, rgba(248, 244, 235, 0.96) 100%);
        color: #6a8963;
        border: 1px solid rgba(194, 169, 128, 0.34);
      }
      .healup-leaf-wiggle {
        transform-origin: center;
        animation: healupLeafWiggle 2.6s ease-in-out infinite;
      }
      @keyframes healupFadeUp {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes healupLeafWiggle {
        0%, 100% { transform: rotate(0deg) scale(1); }
        35% { transform: rotate(-7deg) scale(1.03); }
        65% { transform: rotate(6deg) scale(1.03); }
      }
      body[data-text-size="large"] {
        font-size: 18px;
      }
      body[data-text-size="extra-large"] {
        font-size: 20px;
      }
      body[data-text-size="large"] .text-xs,
      body[data-text-size="extra-large"] .text-xs {
        font-size: 0.875rem !important;
      }
      body[data-text-size="large"] .text-sm {
        font-size: 1rem !important;
      }
      body[data-text-size="extra-large"] .text-sm {
        font-size: 1.0625rem !important;
      }
      body[data-text-size="large"] .text-base,
      body[data-text-size="extra-large"] .text-base {
        font-size: 1.125rem !important;
      }
      /* Custom scrollbar for chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      body.theme-dark {
        background-color: #1f2720;
        color: #eef2eb;
        background-image:
          radial-gradient(circle at top left, rgba(126, 169, 107, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(180, 150, 106, 0.12), transparent 26%);
      }
      body.theme-dark h1,
      body.theme-dark h2,
      body.theme-dark h3,
      body.theme-dark h4,
      body.theme-dark h5,
      body.theme-dark h6 {
        color: #f3f7f1;
      }
      body.theme-dark [class*="bg-white"] {
        background-color: rgba(26, 38, 33, 0.92) !important;
      }
      body.theme-dark [class*="bg-gray-50"] {
        background-color: rgba(32, 46, 40, 0.86) !important;
      }
      body.theme-dark [class*="bg-gray-100"] {
        background-color: rgba(43, 59, 51, 0.92) !important;
      }
      body.theme-dark [class*="bg-matcha-50"] {
        background-color: rgba(35, 50, 42, 0.9) !important;
      }
      body.theme-dark [class*="from-white"],
      body.theme-dark [class*="via-white"],
      body.theme-dark [class*="to-white"] {
        --tw-gradient-from: rgba(26, 38, 33, 0.96) var(--tw-gradient-from-position) !important;
        --tw-gradient-to: rgba(26, 38, 33, 0) var(--tw-gradient-to-position) !important;
        --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-via), var(--tw-gradient-to) !important;
      }
      body.theme-dark [class*="text-gray-900"] { color: #f3f7f1 !important; }
      body.theme-dark [class*="text-gray-800"] { color: #e2ebe2 !important; }
      body.theme-dark [class*="text-gray-700"] { color: #d1ded1 !important; }
      body.theme-dark [class*="text-gray-600"] { color: #bdd0bd !important; }
      body.theme-dark [class*="text-gray-500"] { color: #aabfaa !important; }
      body.theme-dark [class*="text-gray-400"] { color: #8aa08a !important; }
      body.theme-dark [class*="border-gray-100"],
      body.theme-dark [class*="border-gray-200"],
      body.theme-dark [class*="border-matcha-50"],
      body.theme-dark [class*="border-matcha-100"] {
        border-color: rgba(189, 208, 189, 0.18) !important;
      }
      body.theme-dark [class*="shadow-sm"],
      body.theme-dark [class*="shadow-md"],
      body.theme-dark [class*="shadow-lg"] {
        box-shadow: 0 18px 40px rgba(2, 8, 23, 0.32) !important;
      }
      body.theme-dark .healup-card,
      body.theme-dark .healup-card-soft {
        background: linear-gradient(180deg, rgba(30, 39, 31, 0.92) 0%, rgba(41, 54, 42, 0.88) 100%) !important;
        border-color: rgba(189, 208, 189, 0.16) !important;
        box-shadow: 0 18px 40px rgba(2, 8, 23, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.03) !important;
      }
      body.theme-dark .healup-parallax-orb {
        background: radial-gradient(circle at 30% 30%, rgba(85, 107, 74, 0.28), rgba(61, 75, 62, 0.14) 55%, rgba(17, 24, 19, 0.05) 100%);
      }
      body.theme-dark .healup-parallax-leaf {
        color: rgba(168, 195, 158, 0.22);
      }
      body.theme-dark .healup-button-secondary {
        background: rgba(31, 39, 32, 0.82);
        color: #dfe8dc;
        border-color: rgba(168, 195, 158, 0.28);
      }
      body.theme-dark .healup-saved-toast {
        background: linear-gradient(135deg, rgba(67, 82, 61, 0.94) 0%, rgba(37, 48, 39, 0.96) 100%);
        color: #dfe8dc;
        border-color: rgba(194, 169, 128, 0.24);
      }
      body.theme-dark input,
      body.theme-dark textarea,
      body.theme-dark select {
        background-color: rgba(22, 33, 28, 0.9) !important;
        color: #edf5ed !important;
        border-color: rgba(189, 208, 189, 0.22) !important;
      }
      body.theme-dark ::placeholder {
        color: #8aa08a;
      }
      body.reduce-motion *,
      body.reduce-motion *::before,
      body.reduce-motion *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      body.reduce-motion .healup-reveal {
        animation: none !important;
      }
      body.reduce-motion .healup-leaf-wiggle {
        animation: none !important;
      }
      body.reduce-motion .healup-parallax-layer {
        transform: none !important;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
        .healup-reveal {
          animation: none !important;
        }
        .healup-leaf-wiggle {
          animation: none !important;
        }
        .healup-parallax-layer {
          transform: none !important;
        }
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
