<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealUp - Autoimmune Health Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Sage green (primary calm accent)
              matcha: {
                50: '#f8f4eb',
                100: '#f1ebdf',
                200: '#e4ddce',
                300: '#d4ccb8',
                400: '#b8c7ae',
                500: '#a8c39e',
                600: '#7ea96b',
                700: '#6a8963',
                800: '#556b4a',
                900: '#3d4b3e',
              },
              // Soft sky blue — reserved for trends, quiet info, focus accents
              sky: {
                50: '#f1f6fa',
                100: '#dde9f1',
                200: '#bdd2de',
                300: '#94b6c5',
                400: '#7099ad',
                500: '#587f93',
                600: '#476878',
                700: '#3a5462',
                800: '#2e424d',
                900: '#1d2a33',
              },
              // Muted lavender — caregiver tones, support moments, secondary highlights
              lavender: {
                50: '#f5f3ff',
                100: '#ede9fe',
                200: '#ddd6fe',
                300: '#c4b5fd',
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95',
              },
              // Warm beige — backgrounds, soft cards, restful surfaces
              beige: {
                50: '#fdfaf4',
                100: '#f4ebd8',
                200: '#efe6d6',
                300: '#e4d3b4',
                400: '#cab490',
                500: '#a8956d',
                600: '#85704f',
                700: '#5e4f37',
              },
              // Dark mode foundations
              ink: {
                900: '#0f172a', // deep navy
                800: '#111c2f',
                700: '#1e293b', // charcoal
                600: '#293346',
                500: '#3b475c',
              },
            },
            fontFamily: {
              sans: ['Source Sans 3', 'Segoe UI', 'sans-serif'],
            },
            fontSize: {
              sm: ['0.875rem', { lineHeight: '1.6' }],
              base: ['1rem', { lineHeight: '1.65' }],
              md: ['1.125rem', { lineHeight: '1.65' }],
              lg: ['1.375rem', { lineHeight: '1.4' }],
              xl: ['1.75rem', { lineHeight: '1.3' }],
            },
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
        font-size: 17.5px;
        line-height: 1.74;
        background-color: #f8f4eb; /* matcha-50 */
        color: #4f554d;
        transition: background-color 200ms ease, color 200ms ease;
        background-image:
          radial-gradient(circle at top left, rgba(168, 195, 158, 0.2), transparent 30%),
          radial-gradient(circle at bottom right, rgba(201, 178, 139, 0.14), transparent 26%),
          linear-gradient(180deg, #f8f4eb 0%, #f4efe5 52%, #eef3e8 100%);
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
        color: #556b4a;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }
      p, li, label, span, button, input, textarea, select {
        line-height: 1.6;
      }
      button, input, textarea, select {
        font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
      }
      p, li, label {
        color: #625f58;
      }
      input, textarea, select {
        font-size: 17px;
      }
      .healup-card {
        border: 1px solid rgba(228, 221, 206, 0.95);
        background: linear-gradient(180deg, rgba(255, 253, 249, 0.92) 0%, rgba(248, 244, 235, 0.88) 100%);
        box-shadow: 0 18px 38px rgba(80, 87, 77, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.62);
        backdrop-filter: blur(18px);
      }
      .healup-card-soft {
        border: 1px solid rgba(231, 225, 211, 0.96);
        background: linear-gradient(180deg, rgba(253, 250, 244, 0.92) 0%, rgba(239, 243, 232, 0.82) 100%);
        box-shadow: 0 14px 32px rgba(86, 107, 74, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.58);
        backdrop-filter: blur(14px);
      }
      .healup-divider {
        height: 1px;
        width: 100%;
        background: linear-gradient(90deg, rgba(126, 169, 107, 0), rgba(126, 169, 107, 0.45), rgba(194, 169, 128, 0.35), rgba(126, 169, 107, 0));
      }
      .healup-reveal {
        animation: healupFadeUp 480ms ease-out both;
      }
      .healup-button {
        background-image: linear-gradient(135deg, #7ea96b 0%, #6a8963 100%);
        box-shadow: 0 10px 26px rgba(106, 137, 99, 0.22);
        transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease, background-image 180ms ease;
      }
      .healup-button:hover {
        transform: scale(1.02);
        filter: saturate(0.92) brightness(1.03);
        box-shadow: 0 14px 30px rgba(106, 137, 99, 0.24);
      }
      .healup-button:active {
        transform: scale(0.99);
      }
      .healup-button-secondary {
        border: 1.5px solid rgba(126, 169, 107, 0.34);
        background: rgba(255, 253, 249, 0.78);
        color: #556b4a;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.56);
        transition: transform 180ms ease, background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }
      .healup-button-secondary:hover {
        transform: scale(1.02);
        background: rgba(241, 235, 223, 0.9);
        border-color: rgba(126, 169, 107, 0.48);
      }
      .healup-button-secondary:active {
        transform: scale(0.99);
      }
.healup-focus:focus-visible,
      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible,
      select:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px rgba(248, 244, 235, 0.95), 0 0 0 6px rgba(126, 169, 107, 0.42);
        border-color: rgba(126, 169, 107, 0.72) !important;
      }
      .healup-saved-toast {
        background: linear-gradient(135deg, rgba(239, 228, 209, 0.95) 0%, rgba(248, 244, 235, 0.96) 100%);
        color: #6a8963;
        border: 1px solid rgba(194, 169, 128, 0.34);
      }
      .healup-leaf-wiggle {
        transform-origin: center;
        animation: healupLeafWiggle 2.6s ease-in-out infinite;
      }
      .healup-pulse-glow {
        background: radial-gradient(circle at 30% 30%, rgba(255, 253, 249, 0.92), rgba(168, 195, 158, 0.32) 55%, rgba(239, 228, 209, 0.45) 100%);
      }
      .healup-pulse-button {
        border: 1px solid rgba(255, 255, 255, 0.8);
        background-image: linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(239, 243, 232, 0.9));
        box-shadow: 0 24px 80px rgba(106, 137, 99, 0.18);
        backdrop-filter: blur(6px);
      }
      .healup-pulse-label { color: #556b4a; }
      .healup-pulse-sublabel { color: #6a8963; }
      body.theme-dark .healup-pulse-glow {
        background: radial-gradient(circle at 30% 30%, rgba(74, 222, 128, 0.30), rgba(94, 234, 212, 0.18) 55%, rgba(15, 23, 42, 0.05) 100%);
      }
      body.theme-dark .healup-pulse-button {
        border: 1px solid rgba(74, 222, 128, 0.4);
        background-image: linear-gradient(180deg, #4ade80, #22c55e);
        box-shadow: 0 24px 80px rgba(74, 222, 128, 0.30), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      body.theme-dark .healup-pulse-label { color: #052e16; text-shadow: none; }
      body.theme-dark .healup-pulse-sublabel { color: #14532d; }

      /* ─── Sidebar (light + dark) ─── */
      .healup-sidebar {
        background-color: #fbf8f1;
        border-right: 1px solid rgba(228, 221, 206, 0.7);
        box-shadow: 0 0 24px rgba(80, 87, 77, 0.04);
      }
      .healup-sidebar-divider-bottom { border-bottom: 1px solid rgba(228, 221, 206, 0.5); }
      .healup-sidebar-divider-top { border-top: 1px solid rgba(228, 221, 206, 0.5); }
      .healup-sidebar-wordmark { color: #556b4a; }
      .healup-sidebar-mobile-header {
        background-color: rgba(251, 248, 241, 0.95);
        border-bottom: 1px solid rgba(228, 221, 206, 0.7);
        color: #556b4a;
      }
      .healup-sidebar-mobile-toggle { color: #556b4a; }

      /* Nav items */
      .healup-sidebar-item {
        background-color: transparent;
        color: #6b7d6b;
      }
      .healup-sidebar-item .healup-sidebar-icon { color: #97a597; transition: color 200ms ease; }
      .healup-sidebar-item:hover {
        background-color: rgba(241, 235, 223, 0.65);
        color: #3d4b3e;
      }
      .healup-sidebar-item:hover .healup-sidebar-icon { color: #6a8963; }
      .healup-sidebar-item-active {
        background-color: rgba(168, 195, 158, 0.18);
        color: #3d4b3e;
        font-weight: 600;
        box-shadow: 0 4px 14px rgba(106, 137, 99, 0.10);
      }
      .healup-sidebar-item-active .healup-sidebar-icon { color: #6a8963; }
      .healup-sidebar-active-bar { background: linear-gradient(180deg, #7ea96b, #6a8963); }

      /* Bottom profile */
      .healup-sidebar-profile {
        background-color: transparent;
      }
      .healup-sidebar-profile:hover {
        background-color: rgba(168, 195, 158, 0.14);
      }
      .healup-sidebar-avatar {
        background: linear-gradient(135deg, #a8c39e 0%, #7ea96b 100%);
        color: #1f2a1c;
        box-shadow: 0 4px 14px rgba(126, 169, 107, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      .healup-sidebar-profile-name { color: #3d4b3e; }
      .healup-sidebar-profile-meta { color: #97a597; }
      .healup-sidebar-profile-chevron { color: #97a597; transition: color 200ms ease, transform 200ms ease; }
      .healup-sidebar-profile:hover .healup-sidebar-profile-chevron {
        color: #6a8963;
        transform: translateX(2px);
      }

      /* Dark mode sidebar */
      body.theme-dark .healup-sidebar {
        background-color: #0f172a !important;
        border-right: 1px solid rgba(148, 163, 184, 0.10);
        box-shadow: 0 0 32px rgba(2, 6, 23, 0.4);
      }
      body.theme-dark .healup-sidebar-divider-bottom { border-bottom-color: rgba(148, 163, 184, 0.10); }
      body.theme-dark .healup-sidebar-divider-top { border-top-color: rgba(148, 163, 184, 0.10); }
      body.theme-dark .healup-sidebar-wordmark {
        color: #f1f5f9;
        text-shadow: 0 0 16px rgba(74, 222, 128, 0.25);
      }
      body.theme-dark .healup-sidebar-mobile-header {
        background-color: rgba(15, 23, 42, 0.95) !important;
        border-bottom-color: rgba(148, 163, 184, 0.12);
        color: #e2e8f0;
      }
      body.theme-dark .healup-sidebar-mobile-toggle { color: #cbd5e1; }

      body.theme-dark .healup-sidebar-item {
        background-color: rgba(30, 41, 55, 0.6);
        color: #cbd5e1;
        border: 1px solid rgba(148, 163, 184, 0.06);
      }
      body.theme-dark .healup-sidebar-item .healup-sidebar-icon { color: #94a3b8; }
      body.theme-dark .healup-sidebar-item:hover {
        background-color: rgba(30, 41, 55, 0.95);
        color: #f1f5f9;
        border-color: rgba(74, 222, 128, 0.18);
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.4);
      }
      body.theme-dark .healup-sidebar-item:hover .healup-sidebar-icon { color: #86efac; }
      body.theme-dark .healup-sidebar-item-active {
        background-color: rgba(74, 222, 128, 0.10) !important;
        color: #f1f5f9 !important;
        font-weight: 600;
        border-color: rgba(74, 222, 128, 0.30);
        box-shadow: 0 6px 22px rgba(2, 6, 23, 0.5), 0 0 0 1px rgba(74, 222, 128, 0.18) inset;
      }
      body.theme-dark .healup-sidebar-item-active .healup-sidebar-icon { color: #4ade80; }
      body.theme-dark .healup-sidebar-active-bar {
        background: linear-gradient(180deg, #4ade80, #22c55e);
        box-shadow: 0 0 12px rgba(74, 222, 128, 0.55);
      }

      body.theme-dark .healup-sidebar-profile { background-color: rgba(30, 41, 55, 0.55); }
      body.theme-dark .healup-sidebar-profile:hover {
        background-color: rgba(30, 41, 55, 0.95);
        box-shadow: 0 6px 18px rgba(2, 6, 23, 0.4), 0 0 0 1px rgba(74, 222, 128, 0.18) inset;
      }
      body.theme-dark .healup-sidebar-avatar {
        background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        color: #052e16;
        box-shadow: 0 4px 18px rgba(74, 222, 128, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      }
      body.theme-dark .healup-sidebar-profile-name { color: #f1f5f9 !important; }
      body.theme-dark .healup-sidebar-profile-meta { color: #94a3b8 !important; }
      body.theme-dark .healup-sidebar-profile-chevron { color: #94a3b8; }
      body.theme-dark .healup-sidebar-profile:hover .healup-sidebar-profile-chevron { color: #4ade80; }
      @keyframes healupFadeUp {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes healupLeafWiggle {
        0%, 100% { transform: rotate(0deg) scale(1); }
        35% { transform: rotate(-7deg) scale(1.03); }
        65% { transform: rotate(6deg) scale(1.03); }
      }
      body[data-text-size="large"] {
        font-size: 18px;
      }
      body[data-text-size="extra-large"] {
        font-size: 20px;
      }
      body[data-text-size="large"] .text-xs,
      body[data-text-size="extra-large"] .text-xs {
        font-size: 0.875rem !important;
      }
      body[data-text-size="large"] .text-sm {
        font-size: 1rem !important;
      }
      body[data-text-size="extra-large"] .text-sm {
        font-size: 1.0625rem !important;
      }
      body[data-text-size="large"] .text-base,
      body[data-text-size="extra-large"] .text-base {
        font-size: 1.125rem !important;
      }
      /* Custom scrollbar for chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      /* ─── Dark mode: solid deep charcoal navy, no decorative gradients ─── */
      body.theme-dark {
        background-color: #0f172a;
        color: #f1f5f9;
        background-image: none;
      }
      /* Soft-glow headings */
      body.theme-dark h1,
      body.theme-dark h2,
      body.theme-dark h3 {
        color: #f1f5f9;
        text-shadow: 0 0 28px rgba(74, 222, 128, 0.16);
      }
      body.theme-dark h4,
      body.theme-dark h5,
      body.theme-dark h6 {
        color: #e2e8f0;
        text-shadow: 0 0 16px rgba(74, 222, 128, 0.10);
      }

      /* Surfaces: cards distinctly LIGHTER than body so they layer cleanly */
      body.theme-dark [class*="bg-white"] {
        background-color: #1e293b !important;
      }
      body.theme-dark [class*="bg-gray-50"] {
        background-color: rgba(30, 41, 59, 0.65) !important;
      }
      body.theme-dark [class*="bg-gray-100"] {
        background-color: rgba(51, 65, 85, 0.85) !important;
      }
      body.theme-dark [class*="bg-gray-200"] {
        background-color: rgba(71, 85, 105, 0.7) !important;
      }
      body.theme-dark [class*="bg-matcha-50"] {
        background-color: rgba(74, 222, 128, 0.10) !important;
      }
      body.theme-dark [class*="bg-matcha-100"] {
        background-color: rgba(74, 222, 128, 0.16) !important;
      }
      /* Catch other light status backgrounds (used in event/expert/discover badges) */
      body.theme-dark [class*="bg-amber-50"],
      body.theme-dark [class*="bg-yellow-50"] {
        background-color: rgba(251, 191, 36, 0.10) !important;
      }
      body.theme-dark [class*="bg-amber-100"] {
        background-color: rgba(251, 191, 36, 0.16) !important;
      }
      body.theme-dark [class*="bg-red-50"],
      body.theme-dark [class*="bg-rose-50"] {
        background-color: rgba(248, 113, 113, 0.10) !important;
      }
      body.theme-dark [class*="bg-blue-50"] {
        background-color: rgba(94, 234, 212, 0.10) !important;
      }
      body.theme-dark [class*="bg-green-50"] {
        background-color: rgba(74, 222, 128, 0.10) !important;
      }
      /* Catch all the hardcoded warm-cream hex backgrounds the app uses */
      body.theme-dark [class*="bg-[#fffdf9"],
      body.theme-dark [class*="bg-[#fdfaf4"],
      body.theme-dark [class*="bg-[#fbf8f1"],
      body.theme-dark [class*="bg-[#f5f0e6"],
      body.theme-dark [class*="bg-[#eef3e8"],
      body.theme-dark [class*="bg-[#efe6d6"],
      body.theme-dark [class*="bg-[#efe4d1"],
      body.theme-dark [class*="bg-[#edf2e8"],
      body.theme-dark [class*="bg-[#f6efe3"] {
        background-color: rgba(30, 41, 59, 0.78) !important;
        background-image: none !important;
      }

      /* Gradients with white stops */
      body.theme-dark [class*="from-white"],
      body.theme-dark [class*="via-white"],
      body.theme-dark [class*="to-white"] {
        --tw-gradient-from: #1e293b var(--tw-gradient-from-position) !important;
        --tw-gradient-to: rgba(15, 23, 42, 0) var(--tw-gradient-to-position) !important;
        --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-via), var(--tw-gradient-to) !important;
      }

      /* Text hierarchy: off-white primary, slate muted */
      body.theme-dark [class*="text-gray-900"] { color: #f1f5f9 !important; }
      body.theme-dark [class*="text-gray-800"] { color: #e2e8f0 !important; }
      body.theme-dark [class*="text-gray-700"] { color: #cbd5e1 !important; }
      body.theme-dark [class*="text-gray-600"] { color: #94a3b8 !important; }
      body.theme-dark [class*="text-gray-500"] { color: #7a8aa0 !important; }
      body.theme-dark [class*="text-gray-400"] { color: #5b6b82 !important; }
      /* Sage accents brighten so they stay visible on navy */
      body.theme-dark [class*="text-matcha-600"] { color: #86efac !important; }
      body.theme-dark [class*="text-matcha-700"] { color: #4ade80 !important; }
      body.theme-dark [class*="text-matcha-800"] { color: #bbf7d0 !important; }
      body.theme-dark [class*="text-matcha-900"] { color: #dcfce7 !important; }

      /* Borders: subtle slate, almost invisible */
      body.theme-dark [class*="border-gray-50"],
      body.theme-dark [class*="border-gray-100"],
      body.theme-dark [class*="border-gray-200"],
      body.theme-dark [class*="border-matcha-50"],
      body.theme-dark [class*="border-matcha-100"] {
        border-color: rgba(148, 163, 184, 0.14) !important;
      }
      body.theme-dark [class*="border-matcha-200"],
      body.theme-dark [class*="border-matcha-300"] {
        border-color: rgba(74, 222, 128, 0.30) !important;
      }

      /* Shadows: deep ambient + faint sage glow for that "premium dark" feel */
      body.theme-dark [class*="shadow-sm"] {
        box-shadow: 0 4px 14px rgba(2, 6, 23, 0.45) !important;
      }
      body.theme-dark [class*="shadow-md"] {
        box-shadow: 0 12px 28px rgba(2, 6, 23, 0.5) !important;
      }
      body.theme-dark [class*="shadow-lg"] {
        box-shadow: 0 18px 42px rgba(2, 6, 23, 0.55), 0 0 0 1px rgba(74, 222, 128, 0.06) !important;
      }
      body.theme-dark [class*="shadow-xl"] {
        box-shadow: 0 24px 50px rgba(2, 6, 23, 0.6), 0 0 0 1px rgba(74, 222, 128, 0.08) !important;
      }

      /* Cards: opaque slate with subtle inner highlight + ambient outer glow */
      body.theme-dark .healup-card,
      body.theme-dark .healup-card-soft {
        background: linear-gradient(180deg, #1e293b 0%, #1a2336 100%) !important;
        border: 1px solid rgba(148, 163, 184, 0.12) !important;
        box-shadow:
          0 18px 40px rgba(2, 6, 23, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.04),
          0 0 0 1px rgba(74, 222, 128, 0.04) !important;
        backdrop-filter: blur(14px);
      }

      /* Divider: sage → lavender shimmer for soft accent */
      body.theme-dark .healup-divider {
        background: linear-gradient(90deg,
          rgba(74, 222, 128, 0),
          rgba(74, 222, 128, 0.40),
          rgba(196, 181, 253, 0.32),
          rgba(94, 234, 212, 0.28),
          rgba(74, 222, 128, 0));
      }

      /* Parallax decorations */
/* Primary button: bright sage with dark navy text (per spec) */
      body.theme-dark .healup-button {
        background-image: linear-gradient(135deg, #4ade80 0%, #22c55e 100%) !important;
        color: #052e16 !important;
        box-shadow:
          0 10px 28px rgba(74, 222, 128, 0.30),
          inset 0 1px 0 rgba(255, 255, 255, 0.18) !important;
      }
      body.theme-dark .healup-button:hover {
        filter: brightness(1.06) saturate(1.05);
        box-shadow: 0 14px 34px rgba(74, 222, 128, 0.36) !important;
      }

      /* Secondary button: dark slate with soft sage border */
      body.theme-dark .healup-button-secondary {
        background: rgba(30, 41, 59, 0.85);
        color: #cbd5e1;
        border-color: rgba(74, 222, 128, 0.32);
      }
      body.theme-dark .healup-button-secondary:hover {
        background: rgba(51, 65, 85, 0.9);
        border-color: rgba(74, 222, 128, 0.48);
      }

      /* Saved toast: bright sage tint on dark */
      body.theme-dark .healup-saved-toast {
        background: linear-gradient(135deg, rgba(74, 222, 128, 0.20) 0%, rgba(30, 41, 59, 0.94) 100%);
        color: #bbf7d0;
        border-color: rgba(74, 222, 128, 0.34);
      }
